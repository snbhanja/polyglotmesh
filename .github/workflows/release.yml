name: Release

# Build the polyglotmesh binary on every push to a tag matching v*.*.* and
# upload the resulting tarball as a release artifact.
#
# Only builds for x86_64-unknown-linux-gnu (which is the rust toolchain's
# default target on the ubuntu-latest runner). For macOS / Windows binaries,
# add a self-hosted runner or use the cross-rs action — for now we focus on
# the most common case (Linux servers).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build binary (linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
      - name: Build
        run: cargo build --release --bin polyglotmesh
      - name: Package
        run: |
          mkdir -p dist
          cd target/release
          tar -cJf ../../dist/polyglotmesh-x86_64-unknown-linux-gnu.tar.xz polyglotmesh
          sha256sum ../../dist/polyglotmesh-x86_64-unknown-linux-gnu.tar.xz | tee ../../dist/SHA256SUMS
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglotmesh-x86_64-unknown-linux-gnu
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
