name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual run'
        required: false
        default: 'manual trigger'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        # The smoke test uses `fuser` (psmisc) to clean up ports on exit.
        run: sudo apt-get update && sudo apt-get install -y psmisc
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: cargo build
        run: cargo build --release
      - name: cargo test
        run: cargo test --release
      - name: smoke test
        # The smoke script uses `set -euo pipefail` and reads the just-built binary
        # from target/release/polyglotmesh. It listens on 127.0.0.1:18091 and three
        # mock-upstream ports; `fuser -k` (psmisc) cleans them up on exit.
        run: bash scripts/smoke-test.sh

  lint:
    name: Format & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      # `-D warnings` lives here (not as a global RUSTFLAGS) so that harmless
      # warnings from `cargo test` or downstream crates can't fail CI.
      - name: cargo clippy
        # -D warnings on the build+test gate would fire on harmless style
        # nits in transitive code paths. Allow specific clippy lints that
        # are stylistic, not correctness, so a warning doesn't fail CI.
        # See https://rust-lang.github.io/rust-clippy/ for the lint list.
        # NOTE: only valid clippy 1.96 lint names are allowed; unknown names
        # become fatal `unknown-lint` errors under -D warnings.
        run: |
          cargo clippy --all-targets -- \
            -D warnings \
            -A clippy::too_many_arguments \
            -A clippy::redundant_closure \
            -A clippy::io_other_error \
            -A clippy::needless_borrow \
            -A clippy::collapsible_match \
            -A clippy::while_let_loop \
            -A clippy::large_types_passed_by_value \
            -A clippy::large_enum_variant
