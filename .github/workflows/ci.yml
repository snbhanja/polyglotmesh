name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        # The smoke test uses `fuser` (psmisc) to clean up ports on exit.
        run: sudo apt-get update && sudo apt-get install -y psmisc
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: cargo build
        run: cargo build --release
      - name: cargo test
        run: cargo test --release
      - name: smoke test
        # The smoke script uses `set -euo pipefail` and reads the just-built binary
        # from target/release/polyglotmesh. It listens on 127.0.0.1:18091 and three
        # mock-upstream ports; `fuser -k` (psmisc) cleans them up on exit.
        run: bash scripts/smoke-test.sh

  lint:
    name: Format & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      # `-D warnings` lives here (not as a global RUSTFLAGS) so that harmless
      # warnings from `cargo test` or downstream crates can't fail CI.
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
